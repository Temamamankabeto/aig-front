name: 🚀 Deploy website on push

on:
  push:
    branches:
      - master
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node          node-version: "22"
          cache: npm

      - name: 🔨 Build production standalone application
        env:
          NODE_ENV: production
          SMS_BASE_URL: ${{ secrets.SMS_BASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_API_TIMEOUT: "15000"
        run: |
          set -e

          # Local development values must never override production secrets.
          rm -f .env.local

          npm ci
          npm run build

          test -f .next/standalone/server.js
          test -d .next/static

          rm -rf deploy
          mkdir -p deploy

          # Copy all standalone files, including hidden directories.
          cp -a .next/standalone/. deploy/

          # Next standalone does not copy static assets automatically.
          mkdir -p deploy/.next
          cp -a .next/static deploy/.next/static

          # Copy public assets only when the project contains them.
          if [ -d public ]; then
            cp -a public deploy/public
          fi

          # Passenger/cPanel-safe startup wrapper.
          cp app.js deploy/app.js

          test -f deploy/app.js
          test -f deploy/server.js
          test -d deploy/.next/static

      - name: 📂 Sync standalone application
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ./
          dangerous-clean-slate: false
   dangerous-clean-slate: false

          


