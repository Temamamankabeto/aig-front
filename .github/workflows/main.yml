name: 🚀 Deploy website  push

on:
  push:

      - master
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.15.1"

      - name: 🔨 Install dependencies and build project
        env:
          SMS_BASE_URL: ${{ secrets.SMS_BASE_URL}}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY}}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        #   SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        #   SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        #   SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Replace newlines in the private key for usage
          # echo "${FIREBASE_PRIVATE_KEY}" | tr '\n' '\\n' > key.json
          npm install
          npm run build

      - name: � Validate deployment credentials
        id: ftp-check
        env:
          FTP_SERVER: ${{ vars.FTP_SERVER || secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ vars.FTP_USERNAME || secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ vars.FTP_PASSWORD || secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_SERVER" ] || [ -z "$FTP_USERNAME" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP deployment skipped because one or more deployment credentials are missing."
            echo "Add FTP_SERVER, FTP_USERNAME, and FTP_PASSWORD as GitHub repository secrets or variables."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 📂 Sync files
        if: steps.ftp-check.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@4.2.0
        env:
          FTP_SERVER: ${{ vars.FTP_SERVER || secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ vars.FTP_USERNAME || secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ vars.FTP_PASSWORD || secrets.FTP_PASSWORD }}
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ env.FTP_PASSWORD }}
          dangerous-clean-slate: true
